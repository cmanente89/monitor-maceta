<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MONITOR_MACETA // TERMINAL</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="crt-container">
    <div class="scanline"></div>
    
    <header>
  <h1>> MONITOR_MACETA_V1.0</h1>
  <div class="linea-estado">
    <p>ESTADO_DEL_SISTEMA: <span id="estado-sistema">CONECTANDO...</span></p>
    <button id="btn-recargar" title="Recargar datos">[↻ RECARGAR]</button>
  </div>
  
  <!-- NAVEGACIÓN POR SOLAPAS -->
  <nav class="pestanas-nav">
    <button class="btn-pestana activa" data-tab="tab-actual">> LECTURA_ACTUAL</button>
    <button class="btn-pestana" data-tab="tab-graficos">> TELEMETRIA_GRAFICOS</button>
  </nav>
</header>

    <main>
      <!-- SOLAPA 1: DATOS ACTUALES -->
      <section id="tab-actual" class="contenido-pestana activa">
        <div class="panel-datos">
          <p>> PLANTA: 
            <select id="select-planta">
              <option value="monstera">MONSTERA DELICIOSA</option>
              <option value="cactus">CACTUS</option>
              <option value="helecho">HELECHO</option>
            </select>
          </p>
          <div class="metricas-grid">
            <p>> HUMEDAD_SUELO: <span id="humedad-suelo" class="destacado">--</span>%</p>
            <p>> TEMP_AMBIENTE: <span id="temp-ambiente">--</span>°C</p>
            <p>> HUMEDAD_AIRE: <span id="humedad-aire">--</span>%</p>
          </div>
          <p>> ULTIMA_LECTURA: <span id="fecha-lectura">--</span></p>
        </div>
      </section>

      <!-- SOLAPA 2: GRÁFICOS MULTIVARIABLE -->
      <section id="tab-graficos" class="contenido-pestana">
        <div class="panel-grafico">
          <p>> HISTORIAL_RECIENTE (ULTIMAS 10 MEDICIONES)</p>
          <div class="leyenda-grafico">
            <span class="leyenda-item verde">■ Hum. Suelo (%)</span>
            <span class="leyenda-item cian">■ Hum. Aire (%)</span>
            <span class="leyenda-item amarillo">■ Temp (°C)</span>
          </div>
          <div class="contenedor-canvas">
            <canvas id="graficoMultivariable"></canvas>
          </div>
        </div>
      </section>

      <!-- <button id="btn-actualizar">> EJECUTAR_ACTUALIZACION.SH</button> -->
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
